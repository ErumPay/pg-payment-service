server:
  port: 8093

spring:
  application:
    name: pgpayment

  datasource:
    url: jdbc:mysql://localhost:3308/pg_payment_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

resilience4j:
  retry:
    instances:
      billingKeyTokenRetrieve:
        max-attempts: 2
        wait-duration: 200ms
        retry-exceptions:
          - feign.RetryableException
          - java.net.SocketTimeoutException
          - java.net.ConnectException

      cardPaymentInquire:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - feign.RetryableException
          - java.net.SocketTimeoutException
          - java.net.ConnectException

      cardPreApprovalInquire:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - feign.RetryableException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
